<section id="contact" class="section contact">
  <div class="contact-background" aria-hidden="true"></div>
  <div class="section-inner contact-inner">
    <header class="section-heading center">
      <p class="section-label">Contact</p>
      <h2>Open to thoughtful software engineering work with good teams.</h2>
      <p>
        {{ contact.availability }}
      </p>
    </header>

    <div class="contact-card">
      <div class="primary">
        <p class="label">Email</p>
        <a class="email" href="mailto:{{ contact.email }}">
          {{ contact.email }}
        </a>

        <p *ngIf="contact.phone" class="phone">{{ contact.phone }}</p>

        <p class="location">{{ contact.location }}</p>
        <p class="authorization" *ngIf="contact.authorization">{{ contact.authorization }}</p>
      </div>

      <div class="links" *ngIf="links.length">
        <p class="label">Elsewhere</p>
        <div class="link-list">
          <a
            *ngFor="let link of links"
            [href]="link.href"
          >
            {{ link.label }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
