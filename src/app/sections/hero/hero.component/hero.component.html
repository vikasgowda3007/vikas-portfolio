<section id="top" class="section hero">
  <div class="hero-backdrop" aria-hidden="true">
    <div class="hero-glow hero-glow-a"></div>
    <div class="hero-glow hero-glow-b"></div>
    <div class="hero-gridlines"></div>
  </div>

  <div class="section-inner hero-inner">
    <div class="hero-copy">
      <p class="hero-overline">{{ resume.location }} · {{ resume.contact.authorization }}</p>

      <h1 class="hero-title">
        <span class="hero-title-name">
          <span class="hero-name-line">{{ primaryName }}</span>
          <span *ngIf="secondaryName" class="hero-name-line hero-name-line-secondary">
            {{ secondaryName }}
          </span>
        </span>
        <span class="hero-title-line">Secure products. Polished interfaces. Grounded engineering.</span>
      </h1>

      <p class="hero-role">
        {{ resume.role }}
      </p>

      <p class="hero-summary">
        {{ resume.summary }}
      </p>

      <div class="hero-actions">
        <a
          class="btn primary"
          href="mailto:{{ resume.contact.email }}"
        >
          Email Vikas
        </a>

        <a
          *ngFor="let link of actionLinks"
          class="btn ghost"
          [href]="link.href"
        >
          {{ link.label }}
        </a>
      </div>

      <ul class="hero-focus" *ngIf="resume.currentFocus?.length">
        <li *ngFor="let item of resume.currentFocus">
          {{ item }}
        </li>
      </ul>
    </div>

    <div class="hero-stage" [class.hero-stage-fallback]="!resume.portrait">
      <div class="portrait-stage" *ngIf="resume.portrait as portrait">
        <div class="portrait-orbit" aria-hidden="true"></div>

        <picture class="portrait-frame">
          <source
            *ngIf="portrait.avifSrcSet"
            type="image/avif"
            [attr.srcset]="portrait.avifSrcSet"
            sizes="(max-width: 768px) 82vw, (max-width: 960px) 72vw, (max-width: 1280px) 36vw, 31rem"
          />

          <img
            class="portrait-image"
            [src]="portrait.src"
            [attr.srcset]="portrait.srcSet || null"
            sizes="(max-width: 768px) 82vw, (max-width: 960px) 72vw, (max-width: 1280px) 36vw, 31rem"
            [alt]="portrait.alt"
            [attr.width]="portrait.width"
            [attr.height]="portrait.height"
            [style.object-position]="portrait.objectPosition || null"
            loading="eager"
            fetchpriority="high"
            decoding="async"
          />
        </picture>
      </div>
    </div>
  </div>
</section>
