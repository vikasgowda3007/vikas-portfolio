<header class="nav">
  <div class="nav-inner">
    <button class="nav-logo" type="button" (click)="scrollHome()" aria-label="Scroll to top">
      <img
        class="brand-mark"
        src="favicon.svg?v=20260405b"
        alt=""
        aria-hidden="true"
        draggable="false"
      />
      <span class="brand-block">
        <span class="name">{{ name }}</span>
        <span class="meta">Software Engineer</span>
      </span>
    </button>

    <nav class="nav-links" aria-label="Main navigation">
      <button
        *ngFor="let section of sections"
        type="button"
        class="nav-link"
        (click)="scrollTo(section.id)"
      >
        {{ section.label }}
      </button>
    </nav>
  </div>
</header>
