<div class="app-shell">
  <app-navbar [name]="resume.name"></app-navbar>

  <main>
    <app-hero [resume]="resume"></app-hero>
    <app-about [resume]="resume"></app-about>
    <app-experience [experience]="resume.experience"></app-experience>
    <app-projects [projects]="resume.projects"></app-projects>
    <app-skills [skills]="resume.skills"></app-skills>
    <app-contact [contact]="resume.contact" [links]="resume.links"></app-contact>
  </main>

  <footer class="app-footer">
    <p>{{ resume.name }} · Tempe, AZ · F-1 student on CPT</p>
    <p>Angular-first full-stack engineer building secure products with a product eye.</p>
  </footer>
</div>
